<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat Realtime com Áudio</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; max-width: 60%; font-size: 16px; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.audio-msg { background: #dcf8c6; }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; align-items: center; }
        #texto { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; font-size: 16px; }
        button { border: none; padding: 10px 20px; border-radius: 20px; margin-left: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        .btn-send { background: #00a884; color: white; }
        .btn-mic { background: #007bff; color: white; }
        .btn-mic.recording { background: #dc3545; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="texto" placeholder="Digite uma mensagem..." onkeypress="verificarTecla(event)">
        <button id="mic-btn" class="btn-mic" onclick="alternarGravacao()">🎙️ Gravar</button>
        <button class="btn-send" onclick="enviarTexto()">Enviar</button>
    </div>

    <script>
        const BACKEND_URL = "https://lbot-chat-omnichannel-backend.onrender.com"; 
        const socket = io(BACKEND_URL, {
            path: "/socket.io/",
            transports: ['polling', 'websocket']
        });

        const chat = document.getElementById('chat');
        const textoInput = document.getElementById('texto');
        const micBtn = document.getElementById('mic-btn');

        let mediaRecorder;
        let audioChunks = [];
        let estaGravando = false;

        socket.on('recebe_mensagem', (dados) => {
            const div = document.createElement('div');
            div.classList.add('msg');

            if (dados.tipo === 'audio') {
                div.classList.add('audio-msg');
                const audio = document.createElement('audio');
                audio.src = dados.conteudo;
                audio.controls = true;
                div.appendChild(audio);
            } else {
                div.innerText = dados.conteudo;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        function enviarTexto() {
            const texto = textoInput.value.trim();
            if(texto !== "") {
                socket.emit('envia_mensagem', { tipo: 'texto', conteudo: texto });
                textoInput.value = "";
            }
        }

        function verificarTecla(e) {
            if (e.key === 'Enter') enviarTexto();
        }

        async function alternarGravacao() {
            if (!estaGravando) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Seu navegador não suporta gravação de áudio ou falta HTTPS.");
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob); 
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            socket.emit('envia_mensagem', { tipo: 'audio', conteudo: base64Audio });
                        };
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    estaGravando = true;
                    micBtn.innerText = "🛑 Parar";
                    micBtn.classList.add('recording');
                } catch (err) {
                    console.error("Erro ao acessar microfone:", err);
                    alert("Não foi possível acessar o microfone.");
                }
            } else {
                mediaRecorder.stop();
                estaGravando = false;
                micBtn.innerText = "🎙️ Gravar";
                micBtn.classList.add('recording');
                micBtn.classList.remove('recording');
            }
        }
    </script>
</body>
</html>
