<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Chat Realtime</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            max-width: 60%;
            font-size: 16px;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
        }

        #texto {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button {
            background: #00a884;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin-left: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="texto" placeholder="Digite uma mensagem...">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        const BACKEND_URL = "https://lbot-chat-omnichannel-backend.onrender.com";
        const socket = io(BACKEND_URL, {
            path: "/socket.io/",
            transports: ['polling', 'websocket'] // 'polling' primeiro resolve o bloqueio da Render!
        });
        const chat = document.getElementById('chat');
        const textoInput = document.getElementById('texto');

        socket.on('recebe_mensagem', (dados) => {
            const div = document.createElement('div');
            div.classList.add('msg');
            div.innerText = dados.texto;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        function enviar() {
            const texto = textoInput.value;
            if (texto.trim() !== "") {
                socket.emit('envia_mensagem', { texto });
                textoInput.value = "";
            }
        }
    </script>
</body>

</html>
