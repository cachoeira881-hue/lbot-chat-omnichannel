<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat estilo WhatsApp</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Força a tela a ter exatamente a altura visível do dispositivo e impede o scroll na página inteira */
        html, body { height: 100%; width: 100%; overflow: hidden; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #efeae2; display: flex; flex-direction: column; }
        
        /* O conteúdo do chat vai ocupar todo o espaço restante e criar sua própria barra de rolagem interna */
        #chat { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Balões de Mensagem */
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 15px; line-height: 1.4; max-width: 75%; word-break: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.12); }
        
        /* Mensagem enviada por MIM (Direita - Verde) */
        .msg.meu { align-self: flex-end; background: #d9fdd3; color: #111b21; border-top-right-radius: 0; }
        
        /* Mensagem recebida dos OUTROS (Esquerda - Branco) */
        .msg.outro { align-self: flex-start; background: #ffffff; color: #111b21; border-top-left-radius: 0; }
        
        audio { max-width: 100%; width: 240px; display: block; margin-top: 2px; }

        /* Barra Inferior de Digitação - Totalmente Fixada no Rodapé */
        #input-area { display: flex; padding: 10px; background: #f0f2f5; align-items: center; gap: 10px; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); width: 100%; flex-shrink: 0; }
        
        #texto { flex: 1; padding: 10px 16px; border-radius: 20px; border: none; outline: none; font-size: 15px; background: white; color: #3b3b3b; }
        
        /* Botões Redondos */
        .btn-action { border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: transform 0.1s; flex-shrink: 0; }
        .btn-action:active { transform: scale(0.92); }
        
        .btn-mic { background: #00a884; color: white; }
        .btn-mic.recording { background: #ea0038; animation: pulse 1s infinite; }
        .btn-send { background: #00a884; color: white; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* Limitação de largura em telas grandes para manter o visual limpo no PC */
        @media (min-width: 768px) {
            #chat { padding: 20px 20%; }
            .msg { max-width: 60%; font-size: 16px; }
            audio { width: 280px; }
            #input-area { padding: 12px 20%; }
        }
    </style>
</head>
<body>

    <div id="chat"></div>

    <form id="input-area" onsubmit="enviarPorFormulario(event)">
        <input type="text" id="texto" placeholder="Digite uma mensagem..." autocomplete="off">
        <button type="button" id="mic-btn" class="btn-action btn-mic" onclick="alternarGravacao()">🎙️</button>
        <button type="submit" class="btn-action btn-send">🚀</button>
    </form>

    <script>
        const BACKEND_URL = "https://lbot-chat-omnichannel-backend.onrender.com"; 
        const socket = io(BACKEND_URL, {
            path: "/socket.io/",
            transports: ['polling', 'websocket']
        });

        const chat = document.getElementById('chat');
        const textoInput = document.getElementById('texto');
        const micBtn = document.getElementById('mic-btn');

        let mediaRecorder;
        let audioChunks = [];
        let estaGravando = false;

        socket.on('recebe_mensagem', (dados) => {
            const div = document.createElement('div');
            div.classList.add('msg');

            if (dados.idUsuario === socket.id) {
                div.classList.add('meu');
            } else {
                div.classList.add('outro');
            }

            if (dados.tipo === 'audio') {
                const audio = document.createElement('audio');
                audio.src = dados.conteudo;
                audio.controls = true;
                div.appendChild(audio);
            } else {
                div.innerText = dados.conteudo;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        function enviarPorFormulario(e) {
            e.preventDefault();
            const texto = textoInput.value.trim();
            if(texto !== "") {
                socket.emit('envia_mensagem', { tipo: 'texto', conteudo: texto, idUsuario: socket.id });
                textoInput.value = "";
                textoInput.focus();
            }
        }

        async function alternarGravacao() {
            if (!estaGravando) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Seu navegador não suporta gravação de áudio ou falta permissão HTTPS.");
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob); 
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            socket.emit('envia_mensagem', { tipo: 'audio', conteudo: base64Audio, idUsuario: socket.id });
                        };
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    estaGravando = true;
                    micBtn.innerText = "🛑";
                    micBtn.classList.add('recording');
                } catch (err) {
                    console.error("Erro ao acessar microfone:", err);
                    alert("Não foi possível acessar o microfone.");
                }
            } else {
                mediaRecorder.stop();
                estaGravando = false;
                micBtn.innerText = "🎙️";
                micBtn.classList.remove('recording');
            }
        }
    </script>
</body>
</html>
